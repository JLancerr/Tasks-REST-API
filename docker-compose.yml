version: '3.8'

services:
  # 1. Dedicated PostgreSQL Database Container
  postgres-db:
    image: postgres:15-alpine
    container_name: nestjs-postgres-container
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: taskmanager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Your NestJS API Container
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nestjs-api-container
    restart: always
    ports:
      - "3000:3000"
    # Hot reloading for development
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Targets the database container using internal Docker networking
      DATABASE_URL: "postgresql://myuser:mypassword@postgres-db:5432/taskmanager_db?schema=public"
      JWT_SECRET: "your_super_secret_jwt_key_here"
    depends_on:
      - postgres-db

volumes:
  postgres_data: